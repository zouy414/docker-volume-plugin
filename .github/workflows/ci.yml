name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: 1.25

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
      - name: Test
        run: make unit
      - name: Build
        run: make build
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Build Image
        run: make image
      - name: Build Plugin
        run: make plugin
